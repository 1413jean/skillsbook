<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillsBook · Skills 與 MCP 功能工具書</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='90' y1='0' x2='90' y2='180' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%23313131'/%3E%3Cstop offset='1' stop-color='%23141414'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='32' fill='url(%23g)'/%3E%3Cg fill='%23fff'%3E%3Ccircle cx='42.32' cy='101.96' r='11.32'/%3E%3Ccircle cx='137.68' cy='78.47' r='11.32'/%3E%3Cpath d='M78.14 39.19h23.32L79.2 113.29H55.88z'/%3E%3Cpath d='M100.79 67.15h23.32l-22.26 74.1H78.53z'/%3E%3C/g%3E%3C/svg%3E">
<style>
/* ============================================================
   SkillsBook — 極簡白・書感（支援 Dark Mode）
   ============================================================ */

:root {
  --bg: #fefdf9;
  --bg-soft: #f6f5ee;
  --ink: #2d2c27;
  --ink-secondary: #7a7870;
  --ink-tertiary: #aaa79b;
  --line: #eae8de;
  --accent: #0026FF;
  --accent-soft: #e9edff;
  --mcp: #7a5af5;
  --mcp-soft: #f0ecfe;
  --danger: #d70015;
  --danger-soft: #fdf0f0;
  --toast-bg: #1c1c1e;
  --toast-ink: #ffffff;
  /* 淺色模式：深炭色 footer 收尾 */
  --footer-bg: #1d1c19;
  --footer-ink: #fffce1;
  --footer-sub: #a9a698;
  --footer-meta: #807d70;
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text",
    "PingFang TC", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
  --font-serif: "New York", "Songti TC", "Noto Serif TC", Georgia, serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
}

[data-theme="dark"] {
  --bg: #222225;
  --bg-soft: #2e2e33;
  --ink: #fffce1;
  --ink-secondary: #b8b6a8;
  --ink-tertiary: #807e72;
  --line: #3c3c42;
  --accent: #3edc81;
  --accent-soft: rgba(62, 220, 129, 0.13);
  --mcp: #b59bfc;
  --mcp-soft: rgba(181, 155, 252, 0.16);
  --danger: #ff7a72;
  --danger-soft: rgba(255, 122, 114, 0.14);
  --toast-bg: #fffce1;
  --toast-ink: #222225;
  /* 深色模式：奶油黃 footer 收尾 */
  --footer-bg: #fffce1;
  --footer-ink: #111110;
  --footer-sub: #5f5d54;
  --footer-meta: #8d8a7c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  transition: background 0.35s ease, color 0.35s ease;
}

.page { max-width: 840px; margin: 0 auto; padding: 0 32px; }

/* ====== 主題切換 ====== */

.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 40;
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  color: var(--ink-secondary);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 99px;
  cursor: pointer;
  transition: background 0.35s ease, border-color 0.35s ease, color 0.2s;
}

.theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
.theme-toggle svg { width: 17px; height: 17px; }

/* ====== 迷你固定 Header（捲動時出現）====== */

.mini {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 30;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(16px) saturate(160%);
  -webkit-backdrop-filter: blur(16px) saturate(160%);
  border-bottom: 1px solid var(--line);
  opacity: 0;
}

.mini-inner {
  max-width: 840px;
  margin: 0 auto;
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.theme-toggle.in-mini {
  position: static;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  background: transparent;
  border-color: transparent;
}
.theme-toggle.in-mini:hover { border-color: var(--accent); }

.mini-back {
  display: none;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  font-family: var(--font-sans);
  font-size: 16px;
  color: var(--ink-secondary);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 99px;
  cursor: pointer;
  transition: color 0.18s, border-color 0.18s;
}

.mini-back:hover { color: var(--accent); border-color: var(--accent); }
.mini-back.is-visible { display: inline-flex; }

.mini-title {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
}

.mini-title .header-title-accent { font-style: italic; color: var(--accent); }

.mini-search {
  flex: 1;
  max-width: 360px;
  margin-left: auto;
  padding: 8px 16px;
  font-family: var(--font-sans);
  font-size: 13.5px;
  color: var(--ink);
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 99px;
  outline: none;
  transition: border-color 0.18s, background 0.35s, box-shadow 0.18s;
}

.mini-search::placeholder { color: var(--ink-tertiary); }
.mini-search:focus { background: var(--bg); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

@media (max-width: 600px) {
  .mini-inner { padding: 8px 16px; gap: 8px; }
  .mini-title { display: none; }
}

/* ====== Header ====== */

.header { padding: 80px 0 36px; text-align: center; }

/* ====== Logo ====== */

.logo-mark { display: inline-block; }

.logo-hero {
  width: 40px;
  height: auto;
  color: var(--ink);
  margin-bottom: 14px;
}

.logo-mini {
  width: 18px;
  height: 16px;
  margin-right: 7px;
  vertical-align: -2px;
  color: var(--ink);
}

.logo-footer {
  width: 54px;
  height: auto;
  color: var(--footer-ink);
  margin-bottom: -52px;   /* 抵銷 footer-inner 的大間距，與標語保持 36px */
}

.header-eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-tertiary);
  margin-bottom: 16px;
}

.header-title {
  font-family: var(--font-serif);
  font-size: clamp(46px, 9vw, 92px);
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.12;
}

/* 每行一個遮罩，逐字從遮罩下方升起；fit-content 讓底線只跟字一樣寬 */
.header-title .word {
  display: block;
  width: fit-content;
  overflow: hidden;
  padding: 0.05em 0.1em;
  margin: -0.03em auto;
}

.header-title .char { display: inline-block; will-change: transform; }

/* 重點字：手寫書感的底線（字進場後從左劃到右） */
.header-title .word.header-title-accent { position: relative; color: inherit; }

.header-title .word.header-title-accent::after {
  content: '';
  position: absolute;
  left: 0.1em; right: 0.1em;
  bottom: 0.09em;
  height: 0.038em;
  background: currentColor;
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.1s;
}

.header-title .word.header-title-accent.u-in::after { transform: scaleX(1); }

/* 章節模式：標題換成章名，字級收斂一點（中文長章名才放得下） */
.header-title.is-chapter {
  font-size: clamp(36px, 7vw, 68px);
  letter-spacing: 0;
}

.header-subtitle.is-off { display: none; }

.header-subtitle {
  margin: 16px auto 0;
  max-width: 420px;
  font-size: 15px;
  color: var(--ink-secondary);
}

/* ====== Search ====== */

.search-wrap { position: relative; max-width: 540px; margin: 32px auto 0; }

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--ink-tertiary);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 13px 48px 13px 46px;
  font-family: var(--font-sans);
  font-size: 15px;
  color: var(--ink);
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 99px;
  outline: none;
  transition: border-color 0.18s, background 0.35s, box-shadow 0.18s, color 0.35s;
}

.search-input::placeholder { color: var(--ink-tertiary); }

.search-input:focus {
  background: var(--bg);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.search-kbd {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-tertiary);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 1px 7px;
}

#view { touch-action: pan-y; }

/* ====== 目錄 ====== */

.toc { padding: 44px 0 24px; }
.toc-part { margin-bottom: 40px; }

.toc-part-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 4px;
}

.toc-part-title .en {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-tertiary);
}

.toc-part-desc { font-size: 13.5px; color: var(--ink-secondary); margin-bottom: 16px; }

.toc-row {
  display: flex;
  align-items: baseline;
  gap: 12px;
  width: 100%;
  padding: 11px 4px;
  font-family: inherit;
  font-size: 15.5px;
  color: var(--ink);
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
}

.toc-num {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 13.5px;
  color: var(--ink-tertiary);
  width: 34px;
  flex-shrink: 0;
  white-space: nowrap;
}

.toc-name { flex-shrink: 0; font-weight: 500; }
.toc-row:hover .toc-name { color: var(--accent); }

.toc-arrow {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  opacity: 0;
  transform: translateX(-4px);
  transition: opacity 0.2s, transform 0.2s;
}

.toc-row:hover .toc-arrow { opacity: 1; transform: translateX(0); }

.toc-dots { flex: 1; border-bottom: 1.5px dotted var(--line); transform: translateY(-4px); }
.toc-count { font-family: var(--font-mono); font-size: 13px; color: var(--ink-tertiary); flex-shrink: 0; }

/* ====== 附錄（工具操作：同步／備份／復原）====== */

.toc-appendix { margin-top: 64px; padding-top: 30px; border-top: 1px solid var(--line); }
.toc-appendix .toc-part-title { font-size: 19px; }

.toc-sub {
  font-size: 12.5px;
  color: var(--ink-tertiary);
  flex-shrink: 0;
  transition: color 0.2s;
}

.toc-row:hover .toc-sub { color: var(--ink-secondary); }
.toc-row[hidden] { display: none; }

.toc-appendix .toc-count {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

@media (max-width: 560px) {
  .toc-sub { display: none; }
}

/* ====== 章節頁 ====== */

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-sans);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink-secondary);
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 99px;
  padding: 7px 16px;
  cursor: pointer;
  margin-bottom: 36px;
  transition: color 0.18s, border-color 0.18s, background 0.35s;
}

.back-btn:hover { color: var(--accent); border-color: var(--accent); }

.chapter { padding-top: 8px; }

.chapter-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 8px;
}
.chapter-bar .back-btn { margin-bottom: 0; }

.chapter-tools { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.chapter-count { font-family: var(--font-mono); font-size: 12px; color: var(--ink-tertiary); }

/* ====== 編輯表單與貼上框 ====== */

.edit-form {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px dashed var(--line);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.edit-form input,
.edit-form textarea,
.paste-box {
  font: inherit;
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
  outline: none;
  resize: vertical;
  transition: border-color 0.2s;
}

.edit-form input:focus,
.edit-form textarea:focus,
.paste-box:focus { border-color: var(--accent); }

.paste-box {
  width: 100%;
  min-height: 170px;
  font-family: var(--font-mono);
  font-size: 12px;
  box-sizing: border-box;
}

.remove-pill { color: var(--danger); }

/* ====== 詞條（英文標題為主）====== */

.entry { border-bottom: 1px solid var(--line); padding: 24px 0; cursor: pointer; }
.entry:last-of-type { border-bottom: none; }

.entry-head { display: flex; align-items: center; gap: 10px; }

.entry-en-title {
  font-family: var(--font-mono);
  font-size: 18.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
  transition: color 0.2s;
  word-break: break-all;
}

.entry:hover .entry-en-title { color: var(--accent); }

.entry-type {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2.5px 9px;
  border-radius: 99px;
  flex-shrink: 0;
}

.entry-type.skill { color: var(--accent); background: var(--accent-soft); }
.entry-type.mcp { color: var(--mcp); background: var(--mcp-soft); }

.entry-vendor {
  font-family: var(--font-sans);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--ink-secondary);
  border: 1px solid var(--line);
  border-radius: 99px;
  padding: 2px 9px;
  flex-shrink: 0;
}

/* 作用平台：出品方 ≠ 操作對象時顯示 */
.entry-on {
  font-family: var(--font-sans);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--mcp);
  border: 1px dashed var(--mcp);
  border-radius: 99px;
  padding: 2px 9px;
  flex-shrink: 0;
}

.entry-chevron {
  margin-left: auto;
  color: var(--ink-tertiary);
  flex-shrink: 0;
  width: 16px;
  height: 16px;
}

.entry-zh-sub { margin-top: 6px; font-size: 15px; font-weight: 600; color: var(--ink); }

.entry-desc {
  margin-top: 7px;
  font-size: 14.5px;
  line-height: 1.8;
  color: var(--ink-secondary);
  max-width: 720px;
}

/* 展開區 */
.entry-detail { height: 0; overflow: hidden; }

.entry-detail-inner {
  margin-top: 18px;
  padding: 18px 20px;
  background: var(--bg-soft);
  border-radius: 14px;
  display: grid;
  gap: 16px;
  transition: background 0.35s;
}

.detail-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-tertiary);
  margin-bottom: 4px;
}

.detail-block p { font-size: 14px; line-height: 1.7; color: var(--ink-secondary); }

.trigger-pill {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 7px 13px;
  cursor: pointer;
  text-align: left;
  transition: background 0.35s, color 0.2s, border-color 0.2s;
}

.trigger-pill:hover { border-color: var(--accent); color: var(--accent); }

.entry-actions { display: flex; justify-content: flex-end; }

.btn-ghost {
  font-family: var(--font-sans);
  font-size: 12.5px;
  color: var(--ink-tertiary);
  background: none;
  border: none;
  border-radius: 8px;
  padding: 5px 10px;
  cursor: pointer;
}

.btn-ghost:hover { color: var(--danger); background: var(--danger-soft); }

/* ====== 搜尋結果 / 無結果 ====== */

.result-head {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 600;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--ink);
}

.result-head .q { color: var(--accent); font-style: italic; }

.empty { text-align: center; padding: 56px 0; color: var(--ink-tertiary); font-size: 14.5px; }

/* ====== Footer（GSAP 風格：大色塊＋角落版權）====== */

/* 深淺模式互為反差：淺色→深炭塊，深色→奶油黃塊 */
.footer {
  margin-top: 96px;
  background: var(--footer-bg);
  transition: background 0.35s ease;
}

.footer .footer-headline { color: var(--footer-ink); }
.footer .footer-bottom { color: var(--footer-sub); }
.footer .footer-meta { color: var(--footer-meta); }

.footer-inner {
  max-width: 840px;
  margin: 0 auto;
  padding: 72px 32px 36px;
  display: flex;
  flex-direction: column;
  gap: 88px;
}

.footer-headline {
  font-family: var(--font-sans);
  font-size: clamp(26px, 4vw, 38px);
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.3;
  max-width: 520px;
}

.footer-headline .accent { color: inherit; font-style: normal; }

.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 12.5px;
  color: var(--ink-secondary);
}

.footer-meta { color: var(--ink-tertiary); }

@media (max-width: 600px) {
  .footer-inner { padding: 48px 20px 28px; gap: 56px; }
  .footer-bottom { flex-direction: column; align-items: flex-start; gap: 8px; }
}

/* ====== Snackbar 通知 ====== */

.snack-stack {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 70;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}

.snack {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--toast-bg);
  color: var(--toast-ink);
  font-size: 13px;
  line-height: 1.45;
  padding: 10px 12px 10px 16px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
  pointer-events: auto;
  max-width: min(92vw, 480px);
}

.snack-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #3edc81;
  flex-shrink: 0;
}
.snack.is-error .snack-dot { background: #ff5f56; }

.snack-code {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 6px;
  background: rgba(127, 127, 127, 0.28);
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.snack-close {
  background: none; border: none; cursor: pointer;
  color: inherit; opacity: 0.55;
  font-size: 12px; line-height: 1;
  padding: 3px 5px;
  border-radius: 5px;
}
.snack-close:hover { opacity: 1; }

@media (max-width: 600px) {
  .header { padding: 64px 0 28px; }
  .search-kbd { display: none; }
  .theme-toggle { top: 14px; right: 14px; }
}

/* ====== Sync Modal ====== */

.sync-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.38);
  z-index: 60;
  opacity: 0;
}
.sync-modal {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(480px, calc(100vw - 40px));
  max-height: min(520px, calc(100vh - 80px));
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  z-index: 61;
  display: flex; flex-direction: column;
  overflow: hidden;

function vendorOf(item) {
  if (item.imported) return '本機匯入';
  if (VENDOR_BY_ID[item.id]) return VENDOR_BY_ID[item.id];
  if (item.id.startsWith('fc-')) return 'Figma Community';
  const en = item.en.toLowerCase();
  if (en.startsWith('figma:')) return 'Figma';
  if (en.startsWith('gsap')) return 'GSAP';
  if (en.startsWith('atlassian:')) return 'Atlassian';
  if (en.startsWith('slack:')) return 'Slack';
  if (en.startsWith('apollo:')) return 'Apollo';
  if (en.startsWith('common-room:')) return 'Common Room';
  return 'Anthropic';
}

const themeToggle = document.getElementById('themeToggle');
const iconSun = document.getElementById('iconSun');
const iconMoon = document.getElementById('iconMoon');

function applyTheme(theme, animate) {
  document.documentElement.dataset.theme = theme;
  iconSun.style.display = theme === 'dark' ? 'none' : '';
  iconMoon.style.display = theme === 'dark' ? '' : 'none';
  localStorage.setItem('toolbook-theme', theme);
  if (animate) gsap.fromTo(themeToggle, { rotation: -40, scale: 0.85 }, { rotation: 0, scale: 1, duration: D(0.5), ease: 'back.out(2)' });
}

themeToggle.addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  applyTheme(next, true);
});

applyTheme(
  localStorage.getItem('toolbook-theme') ||
  (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
  false
);

/* ====== 目錄頁 ====== */

function renderToc(animate = true) {
  currentChapter = null;
  pageIndex = 0;
  window.setHero?.({ type: 'toc' });
  view.innerHTML = '';
  const toc = document.createElement('nav');
  toc.className = 'toc';

  PARTS.forEach(part => {
    const chapters = part.chapters
      .map(ch => ({ ...ch, items: entriesFor(part.key, ch.key) }))
      .filter(ch => ch.items.length > 0);
    if (!chapters.length) return;

    const el = document.createElement('div');
    el.className = 'toc-part';
    el.innerHTML = `
      <h2 class="toc-part-title">${part.title} <span class="en">${part.en}</span></h2>
      <p class="toc-part-desc">${part.desc}</p>`;
    chapters.forEach((ch, idx) => {
      const row = document.createElement('button');
      row.className = 'toc-row';
      row.innerHTML = `
        <span class="toc-num">${NUMS[idx]}</span>
        <span class="toc-name">${ch.name}</span>
        <span class="toc-arrow">→</span>
        <span class="toc-dots"></span>
        <span class="toc-count">${ch.items.length}</span>`;
      row.addEventListener('click', () => openChapter(part, ch, idx));
      el.appendChild(row);
    });
    toc.appendChild(el);
  });

  /* 附錄：管理這本書的工具列（同步／備份／復原） */
  const apx = document.createElement('div');
  apx.className = 'toc-part toc-appendix';
  apx.innerHTML = `
    <h2 class="toc-part-title">附錄 · 工具 <span class="en">Appendix — Utilities</span></h2>
    <p class="toc-part-desc">管理這本工具書：同步你安裝的工具、備份與還原個人資料。</p>`;
  const actions = [
    { num: 'i',   name: '同步檢查', sub: '掃描你安裝的 Skills 與 MCP', tag: 'scan',   fn: () => openSyncModal() },
    { num: 'ii',  name: '匯出備份', sub: '下載匯入項目與隱藏設定',     tag: 'json ↓', fn: () => exportBackup() },
    { num: 'iii', name: '匯入備份', sub: '從備份檔合併還原',           tag: 'json ↑', fn: () => document.getElementById('importFile').click() },
    { num: 'iv',  name: '復原隱藏項目', sub: `目前隱藏 ${hidden.size} 項`, tag: `${hidden.size}`, fn: () => restoreHidden(), id: 'apxRestore', hide: hidden.size === 0 },
  ];
  actions.forEach(a => {
    const row = document.createElement('button');
    row.className = 'toc-row';
    if (a.id) row.id = a.id;
    if (a.hide) row.hidden = true;
    row.innerHTML = `
      <span class="toc-num">${a.num}</span>
      <span class="toc-name">${a.name}</span>
      <span class="toc-arrow">→</span>
      <span class="toc-sub">${a.sub}</span>
      <span class="toc-dots"></span>
      <span class="toc-count">${a.tag}</span>`;
    row.addEventListener('click', a.fn);
    apx.appendChild(row);
  });
  toc.appendChild(apx);

  view.appendChild(toc);
  if (typeof updateMiniState === 'function') updateMiniState();
  if (animate) {
    gsap.from(toc.querySelectorAll('.toc-part'), { autoAlpha: 0, y: 18, duration: D(0.6), stagger: 0.12, ease: 'power3.out' });
    gsap.from(toc.querySelectorAll('.toc-row'), { autoAlpha: 0, x: -10, duration: D(0.45), stagger: 0.025, ease: 'power2.out', delay: 0.15 });
  }
}

/* ====== 書頁模型：目錄是第 0 頁，之後依序是每一章 ====== */

let pageIndex = 0;

function buildPages() {
  const list = [{ type: 'toc' }];
  PARTS.forEach(part => {
    let d = 0;
    part.chapters.forEach(ch => {
      if (entriesFor(part.key, ch.key).length) {
        list.push({ type: 'chapter', part, ch, dispIdx: d });
        d++;
      }
    });
  });
  return list;
}

function renderPage(p) {
  if (p.type === 'toc') renderToc();
  else renderChapter(p.part, p.ch, p.dispIdx);
}

/* ====== 換頁轉場：柔和淡入淡出＋一點方向感 ====== */
/* dir 1＝往前（下一頁），-1＝往回（上一頁） */

function goToPage(i, dir) {
  const pages = buildPages();
  if (i < 0 || i >= pages.length) return;
  if (reduceMotion) { renderPage(pages[i]); return; }
  const old = view.firstElementChild;
  if (!old) { renderPage(pages[i]); return; }
  gsap.to(old, {
    autoAlpha: 0, x: dir * -20, duration: 0.28, ease: 'power2.in',
    onComplete: () => {
      renderPage(pages[i]);
      gsap.from(view.firstElementChild, { autoAlpha: 0, x: dir * 20, duration: 0.4, ease: 'power3.out', clearProps: 'transform' });
    }
  });
}

/* ====== 章節頁 ====== */

function openChapter(part, ch) {
  const pages = buildPages();
  const i = pages.findIndex(p => p.type === 'chapter' && p.part.key === part.key && p.ch.key === ch.key);
  goToPage(i, 1);
}

function renderChapter(part, ch, idx) {
  currentChapter = { part, ch, idx };
  pageIndex = buildPages().findIndex(p => p.type === 'chapter' && p.part.key === part.key && p.ch.key === ch.key);
  window.setHero?.({ type: 'chapter', part, ch, dispIdx: idx });
  const items = entriesFor(part.key, ch.key);
  view.innerHTML = '';

  const sec = document.createElement('section');
  sec.className = 'chapter';
  const isImportedCh = ch.key === 'imported' || ch.key === 'm-imported';
  sec.innerHTML = `
    <div class="chapter-bar">
      <button class="back-btn">← 回目錄</button>
      <span class="chapter-tools">
        ${isImportedCh ? `
          <button class="sync-add js-tr-copy">複製翻譯 Prompt</button>
          <button class="sync-add js-tr-paste">貼上翻譯結果</button>` : ''}
        <span class="chapter-count">${part.key === 'skill' ? 'SKILLS' : 'MCP'} · ${items.length}</span>
      </span>
    </div>`;
  items.forEach(item => sec.appendChild(makeEntry(item)));
  view.appendChild(sec);

  sec.querySelector('.back-btn').addEventListener('click', () => goToPage(0, -1));

  if (isImportedCh) {
    sec.querySelector('.js-tr-copy').addEventListener('click', () => {
      const untranslated = items.filter(i => /中文介紹待補/.test(i.zhDesc));
      if (!untranslated.length) { snack('沒有待翻譯的項目'); return; }
      copyText(buildTranslatePrompt(untranslated), `已複製 ${untranslated.length} 項的翻譯 Prompt，貼給 Claude 即可`);
    });
    sec.querySelector('.js-tr-paste').addEventListener('click', openTranslatePaste);
  }

  window.scrollTo({ top: 0 });
  if (typeof updateMiniState === 'function') updateMiniState();
  gsap.from(sec.querySelector('.chapter-bar'), { autoAlpha: 0, y: 10, duration: D(0.5), ease: 'power3.out' });
  gsap.from(sec.querySelectorAll('.entry'), { autoAlpha: 0, y: 16, duration: D(0.5), stagger: 0.05, ease: 'power2.out', delay: 0.1 });
}

/* 移除教學：產生一段可以直接貼給 Claude 的移除指令 */
function removePrompt(item) {
  if (item.type === 'skill') {
    return `請幫我移除「${item.en}」這個 skill（在 ~/.claude/skills/ 底下），移除前先告訴我會刪掉哪些檔案。`;
  }
  return `請幫我移除「${item.en}」這個 MCP／plugin 連接，移除前先告訴我會動到哪些設定。`;
}

/* 匯入詞條的中文介紹編輯器 */
function openEntryEditor(item, el) {
  const inner = el.querySelector('.entry-detail-inner');
  if (inner.querySelector('.edit-form')) return;   /* 已開著就不重複 */
  const form = document.createElement('div');
  form.className = 'edit-form';
  form.innerHTML = `
    <p class="detail-label">中文名稱</p>
    <input class="edit-zh" maxlength="20" value="${esc(item.zh)}">
    <p class="detail-label">中文介紹</p>
    <textarea class="edit-zhdesc" rows="3">${esc(item.zhDesc)}</textarea>
    <div class="entry-actions">
      <button class="btn-ghost js-save">儲存</button>
      <button class="btn-ghost js-cancel">取消</button>
    </div>`;
  inner.appendChild(form);
  gsap.from(form, { autoAlpha: 0, y: 8, duration: D(0.3), ease: 'power2.out' });

  form.querySelector('.js-cancel').addEventListener('click', () => form.remove());
  form.querySelector('.js-save').addEventListener('click', () => {
    const zh = form.querySelector('.edit-zh').value.trim();
    const zhDesc = form.querySelector('.edit-zhdesc').value.trim();
    if (zh) item.zh = zh;
    if (zhDesc) item.zhDesc = zhDesc;
    /* importedEntries 與 DATA 共用同一個物件參照，存檔即可 */
    safeStore('toolbook-imported', JSON.stringify(importedEntries));
    el.querySelector('.entry-zh-sub').textContent = item.zh;
    el.querySelector('.entry-desc').textContent = item.zhDesc;
    form.remove();
    snack('已儲存中文介紹');
  });
}

function makeEntry(item) {
  const el = document.createElement('article');
  el.className = 'entry';
  el.innerHTML = `
    <div class="entry-head">
      <h3 class="entry-en-title">${item.en}</h3>
      <span class="entry-type ${item.type}">${item.type === 'skill' ? 'Skill' : 'MCP'}</span>
      <span class="entry-vendor">${vendorOf(item)}</span>
      ${item.on ? `<span class="entry-on">→ ${item.on}</span>` : ''}
      <svg class="entry-chevron" viewBox="0 0 16 16" fill="none">
        <path d="M5 6l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="entry-zh-sub">${item.zh}</p>
    <p class="entry-desc">${item.zhDesc}</p>
    <div class="entry-detail">
      <div class="entry-detail-inner">
        <div class="detail-block">
          <p class="detail-label">English</p>
          <p>${item.enDesc}</p>
        </div>
        ${item.gain ? `<div class="detail-block">
          <p class="detail-label">能幫你解決 · What it solves</p>
          <p>${item.gain}</p>
        </div>` : ''}
        <div class="detail-block">
          <p class="detail-label">怎麼觸發 · How to trigger</p>
          <button class="trigger-pill js-copy" title="點擊複製">${item.trigger}</button>
        </div>
        <div class="detail-block">
          <p class="detail-label">怎麼移除 · How to remove（複製貼給 Claude）</p>
          <button class="trigger-pill remove-pill js-copy" title="點擊複製">${esc(removePrompt(item))}</button>
        </div>
        <div class="entry-actions">
          ${item.imported ? '<button class="btn-ghost js-edit">編輯中文介紹</button>' : ''}
          <button class="btn-ghost js-hide">隱藏這個功能</button>
        </div>
      </div>
    </div>`;

  const detail = el.querySelector('.entry-detail');
  const chevron = el.querySelector('.entry-chevron');
  let open = false;

  el.addEventListener('click', (e) => {
    if (e.target.closest('button, input, textarea, .edit-form')) return;
    open = !open;
    gsap.to(detail, { height: open ? 'auto' : 0, duration: D(0.45), ease: open ? 'power3.out' : 'power3.inOut' });
    gsap.to(chevron, { rotation: open ? 180 : 0, duration: D(0.35), ease: 'power2.out' });
  });

/* ====== Snackbar 通知＋錯誤代碼系統 ====== */

const ERRORS = {
  'TB-100': '無法連線同步服務',
  'TB-101': '同步資料解析失敗',
  'TB-102': '同步發生未預期的錯誤',
  'TB-103': '資料夾讀取失敗',
  'TB-110': '匯入失敗：項目資料不完整',
  'TB-111': '翻譯結果解析失敗',
  'TB-112': '備份檔解析失敗',
  'TB-200': '複製到剪貼簿失敗',
  'TB-300': '無法寫入本機儲存空間',
};

/* HTML 跳脫（所有動態插入內容共用） */
const esc = (s) => String(s).replace(/[<>&"]/g, c => ({ '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;' }[c]));

const snackStack = document.getElementById('snackStack');

function snack(msg, opts = {}) {
  const { code = null, error = false, duration = error ? 6 : 3 } = opts;
  const el = document.createElement('div');
  el.className = 'snack' + (error ? ' is-error' : '');
  el.setAttribute('role', error ? 'alert' : 'status');
  el.innerHTML = `
    <span class="snack-dot"></span>
    <span class="snack-msg"></span>
    ${code ? `<span class="snack-code">${code}</span>` : ''}
    <button class="snack-close" aria-label="關閉">✕</button>`;
  el.querySelector('.snack-msg').textContent = msg;

  /* 最多同時三則，太多就擠掉最舊的 */
  while (snackStack.children.length >= 3) snackStack.firstElementChild.remove();
  snackStack.appendChild(el);

  let killed = false;
  const kill = () => {
    if (killed) return;
    killed = true;
    gsap.to(el, { autoAlpha: 0, y: 8, duration: D(0.25), ease: 'power2.in', onComplete: () => el.remove() });
  };
  const timer = setTimeout(kill, duration * 1000);
  el.querySelector('.snack-close').addEventListener('click', () => { clearTimeout(timer); kill(); });
  gsap.from(el, { autoAlpha: 0, y: 14, scale: 0.96, duration: D(0.4), ease: 'power3.out' });
}

function notifyError(code, detail) {
  const base = ERRORS[code] || '發生未知錯誤';
  snack(detail ? `${base}（${detail}）` : base, { code, error: true });
  console.error(`[SkillsBook ${code}]`, base, detail || '');
}

/* 既有呼叫點的相容介面 */
function showToast(msg) { snack(msg); }

/* localStorage 安全寫入：失敗（隱私模式／空間滿）會跳 TB-300 */
function safeStore(key, value) {
  try { localStorage.setItem(key, value); return true; }
  catch (e) { notifyError('TB-300', e.name); return false; }
}

/* 複製文字：Clipboard API 被拒時退回傳統 execCommand，兩者都失敗才報 TB-200 */
function copyText(text, msg = '已複製') {
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      ta.remove();
      if (ok) showToast(msg);
      else notifyError('TB-200', '瀏覽器拒絕複製');
    } catch (e) {
      notifyError('TB-200', e.message);
    }
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => showToast(msg))
      .catch(fallback);
  } else {
    fallback();
  }
}

/* ====== 手勢換頁：橫向滑動超過門檻就換頁（柔和轉場）====== */

let swipe = null;

view.addEventListener('pointerdown', (e) => {
  if (e.target.closest('input, textarea, button, .trigger-pill, kbd, a')) return;
  swipe = { x: e.clientX, y: e.clientY };
});

window.addEventListener('pointerup', (e) => {
  if (!swipe) return;
  const dx = e.clientX - swipe.x;
  const dy = e.clientY - swipe.y;
  swipe = null;
  if (Math.abs(dx) < 80 || Math.abs(dx) < Math.abs(dy) * 1.5) return;

  const dir = dx < 0 ? 1 : -1;             /* 往左滑＝下一頁 */
  const pages = buildPages();
  const inSearch = currentChapter && currentChapter.search;

  if (inSearch) {
    if (dir === -1) goHome();
    return;
  }
  const target = pageIndex + dir;
  if (target < 0 || target >= pages.length) return;
  goToPage(target, dir);
  updateMiniState();
});

window.addEventListener('pointercancel', () => { swipe = null; });

/* ====== Hero 封面：開場時間軸＋亂碼解碼＋滑鼠視差＋環境微動 ====== */

(() => {
  const header = document.querySelector('.header');
  const logo = document.querySelector('.logo-hero');
  const eyebrow = document.querySelector('.header-eyebrow');
  const subtitle = document.querySelector('.header-subtitle');
  const title = document.getElementById('heroTitle');
  const eyebrowText = eyebrow.textContent;

  /* 拆字 */
  function splitWord(word) {
    const chars = [...word.textContent.trim()];
    word.textContent = '';
    word.setAttribute('aria-hidden', 'true');
    chars.forEach(c => {
      const s = document.createElement('span');
      s.className = 'char';
      s.textContent = c;
      word.appendChild(s);
    });
  }

  /* —— 標題重建：首頁＝Skills/Book 兩行，章節頁＝章名一行 —— */

  let heroKey = 'toc';   /* 目前 hero 顯示的內容，避免重複動畫 */
  let eyeTween = null;

  function buildTitle(lines) {
    title.innerHTML = '';
    lines.forEach(line => {
      const w = document.createElement('span');
      w.className = 'word' + (line.accent ? ' header-title-accent' : '');
      w.textContent = line.text;
      title.appendChild(w);
      splitWord(w);
    });
    return title.querySelectorAll('.char');
  }

  /* 重點字底線：字升完後從左劃出 */
  function revealUnderlines() {
    title.querySelectorAll('.word.header-title-accent').forEach(w => w.classList.add('u-in'));
  }

  function heroConfig(p) {
    if (p.type === 'toc') return {
      key: 'toc',
      eyebrow: eyebrowText,
      lines: [{ text: 'Skills' }, { text: 'Book', accent: true }],
      chapterMode: false,
    };
    return {
      key: `${p.part.key}/${p.ch.key}`,
      eyebrow: `${p.part.en} · 第${NUMS[p.dispIdx]}章`,
      lines: [{ text: p.ch.name }],
      chapterMode: true,
    };
  }

  window.setHero = function (p) {
    const cfg = heroConfig(p);
    if (cfg.key === heroKey) return;
    heroKey = cfg.key;

    title.classList.toggle('is-chapter', cfg.chapterMode);
    subtitle.classList.toggle('is-off', cfg.chapterMode);
    title.setAttribute('aria-label', cfg.lines.map(l => l.text).join(' '));

    if (reduceMotion) {
      const chars = buildTitle(cfg.lines);
      title.querySelectorAll('.word').forEach(w => { w.style.overflow = 'visible'; });
      eyebrow.textContent = cfg.eyebrow;
      revealUnderlines();
      return;
    }

    eyeTween?.kill();
    eyeTween = scrambleTween(eyebrow, cfg.eyebrow, 0.6);

    /* 舊字往下沉回遮罩 → 重建 → 新字升起 */
    const oldChars = title.querySelectorAll('.char');
    title.querySelectorAll('.word').forEach(w => { w.style.overflow = 'hidden'; });
    gsap.to(oldChars, {
      yPercent: 115, duration: 0.3, stagger: 0.012, ease: 'power2.in', overwrite: 'auto',
      onComplete: () => {
        const chars = buildTitle(cfg.lines);
        gsap.from(chars, {
          yPercent: 115, duration: 0.7, stagger: 0.03, ease: 'power4.out',
          onComplete: () => {
            title.querySelectorAll('.word').forEach(w => { w.style.overflow = 'visible'; });
            revealUnderlines();
          }
        });
      }
    });
  };

  /* —— 初次進場 —— */

  title.querySelectorAll('.word').forEach(splitWord);
  const allChars = title.querySelectorAll('.char');
  const words = title.querySelectorAll('.word');

  if (reduceMotion) {
    words.forEach(w => { w.style.overflow = 'visible'; });
    revealUnderlines();
    return;
  }

  /* 亂碼掃描：眉標逐字「解碼」出來（mono 字體寬度穩定）
     同一元素同時只能有一個 scramble，新的會殺掉舊的，避免互相覆寫 */
  const GLYPHS = '░▒▓/\\|·—ABCDEFGHIKLMNOPRSTUVWX';
  const scrambleActive = new WeakMap();
  eyebrow.textContent = '';
  function scrambleTween(el, text, dur) {
    scrambleActive.get(el)?.kill();
    const state = { p: 0 };
    const tween = gsap.to(state, {
      p: 1, duration: dur, ease: 'none',
      onUpdate() {
        const fixed = Math.floor(state.p * text.length);
        el.textContent = text.slice(0, fixed) +
          [...text.slice(fixed)].map(c => c === ' ' ? ' ' : GLYPHS[(Math.random() * GLYPHS.length) | 0]).join('');
      },
      onComplete() { el.textContent = text; scrambleActive.delete(el); }
    });
    scrambleActive.set(el, tween);
    return tween;
  }

  /* —— 開場時間軸 —— */
  const tl = gsap.timeline({ defaults: { ease: 'power4.out' } });
  tl.from(logo, { autoAlpha: 0, scale: 0.4, rotation: -16, duration: 0.8, transformOrigin: '50% 50%' })
    .add(scrambleTween(eyebrow, eyebrowText, 0.9), '-=0.45')
    .from(allChars, { yPercent: 115, duration: 0.9, stagger: { each: 0.035, from: 'start' } }, '-=0.65')
    .add(() => revealUnderlines(), '-=0.25')
    .from('.header-subtitle, .search-wrap', { autoAlpha: 0, y: 18, duration: 0.7, stagger: 0.12 }, '-=0.5')
    .add(() => { words.forEach(w => { w.style.overflow = 'visible'; }); });


})();
renderToc(true);
updateHiddenUI();

  return true;

    <p class="sync-note">進階：在專案資料夾執行 <b>php -S 127.0.0.1:4173</b> 啟動本機伺服器，打開這個視窗就會自動掃描，什麼都不用做。</p>`;

  syncBody.querySelector('#copyAiPrompt').addEventListener('click', () => copyText(buildAiScanPrompt(), '已複製 AI 指令，貼給 Claude 即可'));
  syncBody.querySelector('#aiImport').addEventListener('click', () => document.getElementById('importFile').click());
  syncBody.querySelector('#pickFolder')?.addEventListener('click', runFolderSync);
  syncBody.querySelector('#copyPathMac')?.addEventListener('click', () => copyText('~/.claude', '已複製路徑'));
  syncBody.querySelector('#copyPathWin')?.addEventListener('click', () => copyText('%USERPROFILE%\\.claude', '已複製路徑'));
}

/* 用 File System Access API 掃描使用者選取的資料夾 */
async function scanDirectory(root) {
  const data = { skills: [], plugins: [] };
  let skillsDir = root;
  try { skillsDir = await root.getDirectoryHandle('skills'); } catch { /* 選的就是 skills 資料夾本身 */ }

  for await (const [name, handle] of skillsDir.entries()) {
    if (handle.kind !== 'directory' || name.startsWith('.')) continue;
    try {
      const fh = await handle.getFileHandle('SKILL.md');
      const text = (await (await fh.getFile()).text()).slice(0, 600);
      let skillName = name, desc = '';
      const m = text.match(/^---\s*\n([\s\S]*?)\n---/);
      if (m) {
        const d = m[1].match(/^description:\s*(.+)$/m);
        if (d) desc = d[1].trim().slice(0, 120);
        const n = m[1].match(/^name:\s*(.+)$/m);
        if (n) skillName = n[1].trim();
      }
      data.skills.push({ id: name, name: skillName, desc });
    } catch { /* 沒有 SKILL.md（或 symlink 讀不到）就跳過 */ }
  }

  /* 如果選的是 .claude 根目錄，順便讀 plugins */
  try {
    const pluginsDir = await root.getDirectoryHandle('plugins');
    const pf = await pluginsDir.getFileHandle('installed_plugins.json');
    const json = JSON.parse(await (await pf.getFile()).text());
    Object.keys(json.plugins || {}).forEach(pid => {
      data.plugins.push({ id: pid, name: pid.split('@')[0] });
    });
  } catch { /* 不是 .claude 根目錄就略過 */ }

  return data;
}

async function runFolderSync() {
  let root;
  try {
    root = await showDirectoryPicker();
  } catch (e) {
    if (e.name !== 'AbortError') notifyError('TB-103', e.message);
    return;
  }
  syncBody.innerHTML = '<p class="sync-loading">讀取資料夾中…</p>';
  try {
    renderSyncResults(await scanDirectory(root));
  } catch (e) {
    notifyError('TB-103', e.message);
    showFolderGuide('資料夾讀取失敗，請確認選的是 .claude（或 skills）資料夾後再試一次');
  }
}

async function runSync() {
  /* 靜默探測本機 sync.php：有就自動掃描，沒有就走免伺服器教學 */
  try {
    const res = await fetch('sync.php', { cache: 'no-store' });
    if (res.ok) {
      renderSyncResults(await res.json());
      return;
    }
  } catch { /* 沒有本機伺服器或回應無效——預期情況 */ }
  showFolderGuide();
}

function renderSyncResults(data) {
  let newSkills, newPlugins;
  try {
    const knownSkillIds = new Set(DATA.filter(d => d.type === 'skill').map(d => d.id));
    const knownPluginNames = DATA.filter(d => d.type === 'mcp').map(d => d.en.toLowerCase());

    newSkills = (data.skills || []).filter(s => !knownSkillIds.has(s.id));
    /* 名稱比對放寬：完全相同、或收錄名稱中含有該單字（如 "Atlassian (Jira)" 對上 "atlassian"）都算已收錄 */
    newPlugins = (data.plugins || []).filter(p => {
      const n = p.name.toLowerCase();
      return !knownPluginNames.some(en => en === n || en.split(/[^a-z0-9]+/).includes(n));
    });
  } catch (e) {
    notifyError('TB-102', e.message);
    showFolderGuide('同步發生未預期的錯誤，請再試一次');
    return;
  }

  if (newSkills.length === 0 && newPlugins.length === 0) {
    syncBody.innerHTML = `
      <div class="sync-ok">
        <span class="sync-ok-icon">✓</span>
        <span>已是最新版本，沒有未收錄的項目。</span>
      </div>`;
    return;
  }

  let html = '';

  if (newSkills.length > 0) {
    html += `<div class="sync-section" data-kind="skill">
      <div class="sync-section-head">
        <div class="sync-section-title">未收錄 Skills（${newSkills.length}）</div>
        <button class="sync-add js-add-all">全部加入</button>
      </div>`;
    newSkills.forEach((s, i) => {
      html += `<div class="sync-item">
        <div class="sync-item-row">
          <span class="sync-item-name">${esc(s.name)}</span>
          <button class="sync-add js-add" data-kind="skill" data-i="${i}">＋ 加入</button>
        </div>
        ${s.desc ? `<span class="sync-item-desc">${esc(s.desc)}</span>` : ''}
      </div>`;
    });
    html += '</div>';
  }

  if (newPlugins.length > 0) {
    html += `<div class="sync-section" data-kind="plugin">
      <div class="sync-section-head">
        <div class="sync-section-title">未收錄 Plugin / MCP（${newPlugins.length}）</div>
        <button class="sync-add js-add-all">全部加入</button>
      </div>`;
    newPlugins.forEach((p, i) => {
      html += `<div class="sync-item">
        <div class="sync-item-row">
          <span class="sync-item-name">${esc(p.name)}</span>
          <button class="sync-add js-add" data-kind="plugin" data-i="${i}">＋ 加入</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<p class="sync-note">點「加入」會把項目收進「新收錄」章節（存在你的瀏覽器），之後可以再補中文介紹。</p>`;
  syncBody.innerHTML = html;

  const toEntry = (kind, i) => kind === 'skill' ? entryFromSkill(newSkills[i]) : entryFromPlugin(newPlugins[i]);

  syncBody.querySelectorAll('.js-add').forEach(btn => {
    btn.addEventListener('click', () => {
      const ok = importEntry(toEntry(btn.dataset.kind, +btn.dataset.i));
      btn.disabled = true;
      btn.textContent = '已加入';
      afterImport(ok ? 1 : 0);
    });
  });

  syncBody.querySelectorAll('.js-add-all').forEach(btn => {
    btn.addEventListener('click', () => {
      const kind = btn.closest('.sync-section').dataset.kind;
      const list = kind === 'skill' ? newSkills : newPlugins;
      let count = 0;
      list.forEach((_, i) => { if (importEntry(toEntry(kind, i))) count++; });
      btn.closest('.sync-section').querySelectorAll('.sync-add').forEach(b => {
        b.disabled = true;
        if (b.classList.contains('js-add')) b.textContent = '已加入';
      });
      afterImport(count);
    });
  });

  gsap.from(syncBody.querySelectorAll('.sync-item, .sync-ok, .sync-note'),
    { autoAlpha: 0, y: 6, duration: D(0.3), stagger: 0.04, ease: 'power2.out' }
  );
}

/* ====== 翻譯工作流：複製 prompt 給 Claude → 貼回 JSON 套用 ====== */

function buildTranslatePrompt(items) {
  const payload = items.map(i => ({ id: i.id, en: i.en, enDesc: i.enDesc }));
  return `請把以下工具清單翻成繁體中文。只回傳「純 JSON 陣列」，不要任何說明文字或 markdown 圍欄。格式：
[{"id":"原樣保留","zh":"6 字以內的中文功能名","zhDesc":"40~60 字的中文介紹，說明這個工具的用途與適用情境"}]

${JSON.stringify(payload, null, 2)}`;
}

function openTranslatePaste() {
  openSheet('貼上翻譯結果', `
    <textarea class="paste-box" placeholder='貼上 Claude 回傳的 JSON 陣列…'></textarea>
    <div class="sync-section-head" style="margin-top:12px">
      <span class="sync-note" style="margin:0;background:none;padding:0">套用後會更新「新收錄」裡對應項目的中文。</span>
      <button class="sync-add js-tr-apply">套用</button>
    </div>`);
  syncBody.querySelector('.js-tr-apply').addEventListener('click', () => {
    applyTranslations(syncBody.querySelector('.paste-box').value);
  });
}

function applyTranslations(text) {
  let arr;
  try {
    /* 容錯：就算混了其他文字，抓第一段 [...] 來解析 */
    const m = String(text).match(/\[[\s\S]*\]/);
    arr = JSON.parse(m ? m[0] : text);
  } catch (e) {
    notifyError('TB-111', '不是有效的 JSON 陣列');
    return;
  }
  if (!Array.isArray(arr)) { notifyError('TB-111', '格式必須是陣列'); return; }

  let n = 0;
  arr.forEach(t => {
    if (!t || !t.id) return;
    const entry = importedEntries.find(x => x.id === t.id);
    if (!entry) return;
    if (t.zh) entry.zh = String(t.zh).slice(0, 20);
    if (t.zhDesc) entry.zhDesc = String(t.zhDesc).slice(0, 200);
    n++;
  });

  if (!n) { notifyError('TB-111', '沒有對得上的項目 id'); return; }
  safeStore('toolbook-imported', JSON.stringify(importedEntries));
  closeSyncModal();
  if (currentChapter && !currentChapter.search) {
    renderChapter(currentChapter.part, currentChapter.ch, currentChapter.idx);
  }
  snack(`已套用 ${n} 筆翻譯`);
}

/* ====== 匯出／匯入 JSON 備份 ====== */

function exportBackup() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString().slice(0, 10),
    imported: importedEntries,
    hidden: [...hidden],
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `skillsbook-backup-${payload.exportedAt}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  /* 立刻 revoke 會讓部分瀏覽器取消下載，延後釋放 */
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  snack(`已匯出備份（${importedEntries.length} 個匯入項目）`);
}

document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  let data;
  try {
    data = JSON.parse(await file.text());
  } catch {
    notifyError('TB-112', '不是有效的 JSON 檔');
    return;
  }
  if (!data || typeof data !== 'object') { notifyError('TB-112', '格式不正確'); return; }

  let n = 0;
  (Array.isArray(data.imported) ? data.imported : []).filter(x => x && x.id).forEach(entry => {
    if (!importedEntries.some(x => x.id === entry.id)) { importedEntries.push(entry); n++; }
    if (!DATA.some(d => d.id === entry.id)) DATA.push(entry);
  });
  (Array.isArray(data.hidden) ? data.hidden : []).forEach(id => hidden.add(id));

  safeStore('toolbook-imported', JSON.stringify(importedEntries));
  safeStore('toolbook-hidden', JSON.stringify([...hidden]));
  if (!currentChapter) renderToc(false);
  updateHiddenUI();
  snack(n ? `已匯入備份（新增 ${n} 項）` : '已匯入備份（沒有新項目）');
});
</script>
